<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Amazon.com. Spend less. Smile more.</title>
</head>

<body>

    <!-- ! ************************* Nav Started ************************* -->
    <nav>
        <!-- ? Nav Logo -->
        <div class="nav-logo">
            <i class="fa-solid fa-bars"></i>
            <div class="logo-div border">
                <img src="./logo.png" alt="">
            </div>
        </div>

        <!-- ? Nav Multiple -->
        <div class="nav-multiple">
            <div class="sign-in">
                <p>Signin</p>
                <i class="fa-solid fa-angle-right"></i>
            </div>

            <span><i class="fa-solid fa-circle-user sign-in-icon"></i>
                <i class="fa-solid fa-cart-shopping cart-icon"></i></span>

            <div class="lang-div border">
                <img src="https://cdn.britannica.com/33/4833-050-F6E415FE/Flag-United-States-of-America.jpg" alt="">
                <span>EN</span>
                <i class="fa-solid fa-sort-down"></i>
            </div>
            <div class="account-div border">
                <span>Hello, sign in</span>
                <div class="account">
                    <span>Accounts & Lists</span>
                    <i class="fa-solid fa-sort-down"></i>
                </div>
            </div>
            <div class="orders-div border">
                <span>Returns</span>
                <span>& Orders</span>
            </div>
            <div class="cart-div border">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Cart</span>
            </div>
        </div>

        <!-- ? Nav Search -->
        <div class="nav-search">
            <select name="" id="">
                <option selected>All</option>
                <option>All Departments</option>
                <option>Arts &amp; Crafts</option>
                <option>Automotive</option>
                <option>Baby</option>
                <option>Beauty &amp; Personal Care</option>
                <option>Books</option>
                <option>Boys' Fashion</option>
                <option>Computers</option>
                <option>Deals</option>
                <option>Digital Music</option>
                <option>Electronics</option>
                <option>Girls' Fashion</option>
                <option>Health &amp; Household</option>
                <option>Home &amp; Kitchen</option>
                <option>Industrial &amp; Scientific</option>
                <option>Kindle Store</option>
                <option>Luggage</option>
                <option>Men's Fashion</option>
                <option>Movies &amp; TV</option>
                <option>Music, CDs &amp; Vinyl</option>
                <option>Pet Supplies</option>
                <option>Prime Video</option>
                <option>Software</option>
                <option>Sports &amp; Outdoors</option>
                <option>Tools &amp; Home Improvement</option>
                <option>Toys &amp; Games</option>
                <option>Video Games</option>
                <option>Women's Fashion</option>
            </select>
            <input type=" text" placeholder="Search Amazon" class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <!-- ? Nav Belt -->
        <div class="nav-belt">
            <span class="nav-belt--items border"><i class="fa-solid fa-bars"></i>&nbsp;&nbsp;Video</span>
            <span class="nav-belt--items border">Deals</span>
            <span class="nav-belt--items border">Amazon Basics</span>
            <span class="nav-belt--items border">Livestreams</span>
            <span class="nav-belt--items border">Books</span>
            <span class="nav-belt--items border">Best Sellers</span>
            <span class="nav-belt--items border">Music</span>
            <span class="nav-belt--items border">New Releases</span>
            <span class="nav-belt--items border">Home</span>
            <span class="nav-belt--items border">PC</span>
        </div>

        <!-- ? Nav Mobile Delivery -->
        <div class="nav-delivery--mb">
            <div class="border">
                <i class="fa-solid fa-location-dot"></i>
                <span>Deliver to</span>
                <span>Pakistan</span>
            </div>
        </div>
    </nav>
    <!-- ! ************************* Nav Ended ************************* -->

</body>

</html>
